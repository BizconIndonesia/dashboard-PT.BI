<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PT.LHL - Kalteng Operation Dashboard | Real-time mining operations monitoring" />
    <title>PT.LHL - Kalteng Operation Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
  </head>
  <body>
    <div id="root">
      <div style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #0a0a0a; color: #666; margin: 0;">
        <div style="text-align: center;">
          <p style="font-size: 16px; letter-spacing: 2px;">⏳ Memuat Dashboard PT.LHL (BIZCON - Final)...</p>
          <div style="margin-top: 20px; display: inline-block;">
            <div style="width: 40px; height: 40px; border: 3px solid #F37021; border-top: 3px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
          </div>
        </div>
      </div>
    </div>

    <style>
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>

    <!-- Error handling and boot logic -->
    <script type="module" src="/src/errorHandler.ts"></script>
    
    <!-- Main React App -->
    <script type="module" src="/src/main.tsx"></script>
