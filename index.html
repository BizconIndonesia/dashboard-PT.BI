<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PT.LHL - Kalteng Operation Dashboard | Real-time mining operations monitoring" />
    <title>PT.LHL - Kalteng Operation Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <script>
      /**
       * Error handler to catch loading issues before React mounts.
       */
      window.addEventListener('error', function(event) {
        const root = document.getElementById('root');
        if (root && root.innerHTML.includes('Memuat Dashboard')) {
          root.innerHTML = `
            <div style="font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #0a0a0a; color: #E0E6ED; margin: 0; padding: 20px;">
              <div style="max-width: 600px; text-align: center; background: #1A1E26; padding: 40px; border-radius: 12px; border: 1px solid #2D3748;">
                <div style="font-size: 32px; margin-bottom: 20px;">⚠️</div>
                <h2 style="color: #E74C3C; font-size: 20px; margin: 0 0 20px 0; font-weight: bold;">Gagal Memuat Aplikasi</h2>
                <p style="color: #94A3B8; font-size: 14px; margin: 0 0 20px 0; line-height: 1.6;">
                  Terjadi kesalahan saat mengunduh komponen sistem. Mohon muat ulang halaman.
                </p>
                <div style="background: #0F1218; padding: 10px; border-radius: 8px; margin-bottom: 20px; border-left: 3px solid #F37021; text-align: left; font-size: 11px; font-family: monospace; color: #F37021;">
                  💥 ${event.message || 'Unknown error'}
                </div>
                <button onclick="window.location.reload()" style="background: #F37021; color: white; border: none; padding: 12px 32px; border-radius: 6px; font-weight: bold; cursor: pointer;">
                  ↻ Muat Ulang Halaman
                </button>
              </div>
            </div>
          `;
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root">
      <div style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #0a0a0a; color: #666; margin: 0;">
        <div style="text-align: center;">
          <p style="font-size: 16px; letter-spacing: 2px;">⏳ Memuat Dashboard PT.LHL (BIZCON - Final)...</p>
          <div style="margin-top: 20px; display: inline-block;">
            <div style="width: 40px; height: 40px; border: 3px solid #F37021; border-top: 3px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
          </div>
        </div>
      </div>
    </div>

    <style>
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>

    <!-- Main React App -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
